<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>kilian</title>
  <!-- Cormorant Garamond: freely-embeddable, has a true Light (300) italic — closest web match to Apple Garamond Light Italic -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    /* ---------- reset ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --fg: #111;
      --muted: #9a9a9a;
      --line: #ececec;
      --maxw: 600px;
      --serif: "Apple Garamond Light", "Apple Garamond", "Cormorant Garamond", Garamond, Georgia, serif;
    }

    html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      color: var(--fg);
      background: #fff;
      font-size: 16px;
      line-height: 1.6;
      letter-spacing: -0.01em;
    }

    .wrap {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 140px 24px 160px;
    }

    /* ---------- intro ---------- */
    .headline {
      font-family: var(--serif);
      font-weight: 300;
      font-style: italic;
      font-size: 40px;
      line-height: 1.18;
      margin-bottom: 14px;
    }
    .byline { margin-bottom: 40px; }
    .byline__name { display: block; font-size: 16px; font-weight: 500; }
    .byline__attr { display: block; font-size: 14px; color: var(--muted); margin-top: 2px; }

    .bio p { margin-bottom: 20px; }
    .bio a {
      color: var(--fg);
      text-decoration: underline;
      text-decoration-color: #cfcfcf;
      text-underline-offset: 2px;
      transition: text-decoration-color .15s ease;
    }
    .bio a:hover { text-decoration-color: var(--fg); }

    @media (max-width: 640px) {
      .wrap { padding-top: 84px; }
    }
  </style>
</head>
<body>
  <main class="wrap">

    <!-- ===== intro (replace with your own words) ===== -->
    <div class="headline">&ldquo;You don&rsquo;t need more information.<br />You need more execution.&rdquo;</div>
    <div class="byline">
      <span class="byline__name">Kilian Weinzierl</span>
      <span class="byline__attr">&mdash; Alex Hormozi</span>
    </div>

    <div class="bio">
      <p>20 years old. I build things and try to ship faster than I overthink.</p>
      <p>Find me on <a href="#">X</a>, <a href="#">GitHub</a>, or via <a href="#">email</a>.</p>
    </div>

  </main>
</body>
</html>
