<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
  <title>kilian — kwzrl</title>
  <meta name="description" content="Kilian Weinzierl — a terminal that reads you off your own GitHub." />
  <style>
    /* ---------- reset ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #ffffff;
      --fg:     #141414;
      --muted:  #8c8c8c;
      --faint:  #bcbcbc;
      --line:   #e6e6e6;
      --panel:  #fafafa;
      --accent: #141414;   /* monochrome — no green */
      --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
    }
    html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; -webkit-text-size-adjust: 100%; }
    body { font-family: var(--sans); color: var(--fg); background: var(--bg); overflow-x: hidden; }

    /* ---------- terminal column (single pane, sharp) ---------- */
    .term {
      width: 100%; max-width: 720px; height: 100dvh; margin: 0 auto;
      background: var(--bg);
      border-left: 1px solid var(--line); border-right: 1px solid var(--line);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .term__bar { display: flex; align-items: center; gap: 9px; padding: 12px 22px; border-bottom: 1px solid var(--line); flex: 0 0 auto; }
    .status { width: 7px; height: 7px; background: var(--accent); flex: 0 0 auto; }
    .term__title { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: .02em; }
    .term__title b { color: var(--fg); font-weight: 600; }

    /* ---------- log ---------- */
    .log { flex: 1 1 auto; min-width: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 24px 22px 10px; scroll-behavior: smooth; overscroll-behavior: contain; display: flex; flex-direction: column; }
    .log__inner { margin-top: auto; width: 100%; min-width: 0; }
    .msg { max-width: 100%; }
    .log::-webkit-scrollbar { width: 10px; }
    .log::-webkit-scrollbar-thumb { background: #e2e2e2; border: 3px solid #fff; background-clip: padding-box; }
    .log::-webkit-scrollbar-thumb:hover { background: #cfcfcf; background-clip: padding-box; }

    .msg { margin-bottom: 20px; }
    .msg--user { font-family: var(--mono); font-size: 14px; color: var(--fg); display: flex; gap: 10px; align-items: baseline; }
    .msg--user .sqm { align-self: center; }
    .msg--user .txt { min-width: 0; overflow-wrap: anywhere; }
    .sqm { display: inline-block; width: 8px; height: 8px; background: var(--fg); flex: 0 0 auto; }

    .msg--ai { padding-left: 2px; }
    .msg--ai p { margin-bottom: 12px; max-width: 60ch; line-height: 1.62; }
    .msg--ai p:last-child { margin-bottom: 0; }
    .msg--ai a { color: var(--fg); text-decoration: underline; text-decoration-color: #cfcfcf; text-underline-offset: 3px; transition: text-decoration-color .15s; }
    .msg--ai a:hover { text-decoration-color: var(--fg); }
    .dim { color: var(--muted); }
    /* section lead — terminal-style marker before a block */
    .msg--ai .lead { font-family: var(--mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin: 20px 0 10px; }
    .msg--ai .lead:first-child { margin-top: 0; }

    .thinking { display: inline-flex; gap: 5px; padding: 4px 0; }
    .thinking span { width: 6px; height: 6px; border-radius: 50%; background: var(--faint); animation: bounce 1.2s infinite ease-in-out; }
    .thinking span:nth-child(2){ animation-delay: .15s; } .thinking span:nth-child(3){ animation-delay: .3s; }
    @keyframes bounce { 0%,80%,100%{ transform: translateY(0); opacity:.4 } 40%{ transform: translateY(-4px); opacity:1 } }

    .cursor { display: inline-block; width: .55ch; height: 1.05em; background: var(--accent); vertical-align: -2px; margin-left: 1px; animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* tool call */
    .tool { font-family: var(--mono); font-size: 12.5px; color: var(--muted); display: flex; align-items: center; gap: 9px; padding: 8px 12px; margin: 4px 0 14px; border: 1px solid var(--line); background: var(--panel); max-width: max-content; }
    .tool .name { color: #444; }
    .tool .spin { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #e2e2e2; border-top-color: var(--accent); animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tool .check { color: var(--accent); font-weight: 700; }

    /* inline canvas (shared by the github heatmap) */
    .canvas { border: 1px solid var(--line); background: #fff; margin: 4px 0 16px; max-width: 100%; }
    .canvas__bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 12px; color: var(--muted); }
    .canvas__file { color: var(--fg); }
    .canvas__tag { text-transform: uppercase; letter-spacing: .06em; font-size: 11px; }

    /* github contribution heatmap (monochrome) */
    .gh__body { padding: 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .gh__months { display: flex; margin-bottom: 6px; font-family: var(--mono); font-size: 10px; color: var(--muted); }
    .gh__months .m { flex: 0 0 14px; white-space: nowrap; }
    .gh__grid { display: grid; grid-template-rows: repeat(7, 11px); grid-auto-flow: column; grid-auto-columns: 11px; gap: 3px; width: max-content; }
    .gh__cell { width: 11px; height: 11px; }
    .gh__cell--pad { background: transparent !important; }
    .gh [data-level="0"] { background: #ececec; }
    .gh [data-level="1"] { background: #c4c4c4; }
    .gh [data-level="2"] { background: #8f8f8f; }
    .gh [data-level="3"] { background: #4d4d4d; }
    .gh [data-level="4"] { background: #141414; }
    .gh__legend { display: flex; align-items: center; gap: 5px; margin-top: 14px; font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .gh__legend .sq { width: 11px; height: 11px; display: inline-block; }
    .gh__note { font-family: var(--mono); font-size: 12px; color: var(--muted); padding: 14px 16px; }

    /* contact / receipt links */
    .links { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 4px; }
    .link { font-family: var(--mono); font-size: 13px; color: var(--fg); text-decoration: none !important; border: 1px solid var(--line); padding: 8px 14px; background: #fff; transition: border-color .15s; }
    .link:hover { border-color: var(--accent); }

    /* suggestions */
    .suggest { display: flex; flex-wrap: wrap; gap: 8px; padding: 2px 22px 12px; flex: 0 0 auto; }
    .chip { font-family: var(--mono); font-size: 12.5px; color: var(--muted); background: #fff; border: 1px solid var(--line); padding: 6px 12px; cursor: pointer; transition: color .15s, border-color .15s; }
    .chip:hover { color: var(--fg); border-color: var(--accent); }
    .chip::before { content: "→ "; color: var(--faint); }

    /* prompt */
    .prompt { display: flex; align-items: center; gap: 10px; padding: 13px 22px; border-top: 1px solid var(--line); flex: 0 0 auto; }
    .prompt input { flex: 1; min-width: 0; background: transparent; border: 0; outline: 0; color: var(--fg); font-family: var(--mono); font-size: 14px; caret-color: var(--accent); }
    .prompt input::placeholder { color: var(--faint); }
    .prompt.is-busy { opacity: .55; pointer-events: none; }
    .suggest.is-busy { opacity: .4; pointer-events: none; }

    @media (max-width: 560px) {
      .term { max-width: none; border-left: 0; border-right: 0; }
      .log { padding: 20px 16px 6px; }
      .suggest { padding: 2px 16px 10px; }
      .prompt, .term__bar { padding-left: 16px; padding-right: 16px; }
      .prompt input { font-size: 16px; }   /* >=16px prevents iOS zoom-on-focus */
      .msg--ai p { font-size: 15px; }
      .chip { padding: 7px 12px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .cursor, .thinking span, .tool .spin { animation: none !important; }
      .log { scroll-behavior: auto; }
    }
  </style>
</head>
<body>
  <main class="term" role="log" aria-live="polite">
    <div class="term__bar">
      <span class="status" title="online"></span>
      <span class="term__title"><b>kilian weinzierl</b></span>
    </div>
    <div class="log" id="log"><div class="log__inner" id="loginner"></div></div>
    <div class="suggest" id="suggest"></div>
    <form class="prompt" id="promptForm" autocomplete="off">
      <span class="sqm"></span>
      <input id="promptInput" type="text" placeholder="ask it anything about you…" aria-label="Ask the AI about yourself" />
    </form>
  </main>

  <script>
  // ============================================================
  //  CONFIG
  // ============================================================
  const CONFIG = {
    name:  "Kilian Weinzierl",
    email: "kilianweinzierl7@gmail.com",
    github:"kwzrl",   // "" hides
    x:     "",        // handle without @, "" hides
  };

  // ============================================================
  const $log     = document.getElementById("log");
  const $logInner = document.getElementById("loginner");
  const $suggest = document.getElementById("suggest");
  const $form    = document.getElementById("promptForm");
  const $input   = document.getElementById("promptInput");

  const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
  const sleep  = ms => new Promise(r => setTimeout(r, reduce ? 0 : ms));
  const rand   = (a, b) => a + Math.random() * (b - a);
  const scroll = () => { $log.scrollTop = $log.scrollHeight; };
  let busy = false;
  let booting = true;

  function setBusy(v) { busy = v; $form.classList.toggle("is-busy", v); $suggest.classList.toggle("is-busy", v); if (!v) $input.focus(); }

  // ---------- streaming primitives ----------
  // append a submitted prompt to the transcript, instantly (no per-char animation)
  function commitUserMsg(text) {
    const el = document.createElement("div"); el.className = "msg msg--user";
    el.innerHTML = '<span class="sqm"></span><span class="txt"></span>';
    el.querySelector(".txt").textContent = text;
    $logInner.appendChild(el); scroll();
  }
  // type into the real input field at the bottom (used by the boot demo)
  async function typeIntoInput(text) {
    $input.value = "";
    for (const ch of text) { $input.value += ch; await sleep(rand(45, 90)); }
    await sleep(300);
  }
  const aiBlock = () => { const el = document.createElement("div"); el.className = "msg msg--ai"; $logInner.appendChild(el); return el; };
  async function thinking(container) {
    const t = document.createElement("div"); t.className = "thinking"; t.innerHTML = "<span></span><span></span><span></span>";
    container.appendChild(t); scroll(); await sleep(rand(420, 720)); t.remove();
  }
  async function streamText(container, text, { cls = "" } = {}) {
    const p = document.createElement("p"); if (cls) p.className = cls;
    p.innerHTML = '<span class="body"></span><span class="cursor"></span>';
    container.appendChild(p);
    const body = p.querySelector(".body"), words = text.split(" ");
    for (let i = 0; i < words.length; i++) { body.textContent += (i ? " " : "") + words[i]; scroll(); await sleep(rand(16, 52)); }
    p.querySelector(".cursor").remove(); return p;
  }
  async function runTool(container, label) {
    const t = document.createElement("div"); t.className = "tool";
    t.innerHTML = '<span class="spin"></span><span class="name">' + label + '</span>';
    container.appendChild(t); scroll();
    await sleep(rand(600, 950));
    t.querySelector(".spin").outerHTML = '<span class="check">✓</span>';
  }

  // ---------- answers (the AI's honest read of you, in second person) ----------
  async function answerStrengths(ai) {
    await streamText(ai, `Speed and taste. You're fast — in front of people while they're still deciding whether to start — and you finish the go-to-market layer most builders skip: waitlists, launch films, a YC video.`);
    await streamText(ai, `Real range under it: Next.js, Swift, Flutter, mobile and desktop, German and English.`);
  }
  async function answerRoast(ai) {
    await streamText(ai, `You asked for it. Serial-starter syndrome — dozens of folders, most private, most never shipped. You'd rather begin the next thing than grind the last one to a release, and you install every new AI tool instead of committing to one.`);
    await streamText(ai, `Focus is your scarcest resource, not ideas. But at 20, that's the good kind of problem. Keep moving.`, { cls: "dim" });
  }
  async function answerNext(ai) {
    await streamText(ai, `Pick one — it's Avogram — and make everything else a feature or a graveyard. You've got the product, the waitlist, the YC video; the missing piece is a public v1 people can actually touch.`);
  }
  async function answerWork(ai) {
    await streamText(ai, `Can't — there's nothing public to hand you. The work lives in private repos, sealed on purpose.`);
    await streamText(ai, `The one thing that leaks is the graph. That's the only receipt you get.`, { cls: "dim" });
    await runTool(ai, `fetch(github.com/${CONFIG.github})`);
    await renderGithub(ai);
  }
  async function answerContact(ai) {
    await streamText(ai, `People reach you here:`);
    const links = ['<a class="link" href="mailto:' + CONFIG.email + '">✉ email</a>'];
    if (CONFIG.github) links.push('<a class="link" href="https://github.com/' + CONFIG.github + '" target="_blank" rel="noopener">⌥ github / ' + CONFIG.github + '</a>');
    if (CONFIG.x) links.push('<a class="link" href="https://x.com/' + CONFIG.x + '" target="_blank" rel="noopener">𝕏 twitter</a>');
    const d = document.createElement("div"); d.className = "links"; d.innerHTML = links.join(""); ai.appendChild(d); scroll();
  }
  async function answerProjects(ai) {
    await streamText(ai, `Give me a second — pulling from three places at once: my notes on you, your GitHub, and the ~/ folder on this machine.`);
    await runTool(ai, `recall(memory)`);
    await runTool(ai, `fetch(github.com/${CONFIG.github})`);
    await runTool(ai, `ls(~/kilian)`);
    await streamText(ai, `Good haul. Here's the file.`, { cls: "dim" });

    await streamText(ai, `who you are`, { cls: "lead" });
    await streamText(ai, `German, 20, out of Regensburg. A serial builder with founder energy — AI-native to the point your dotfiles rat you out: .codex .grok .gemini .cursor .windsurf .claude. You install every AI tool that ships.`);
    await streamText(ai, `On GitHub since July 2023, but the public face is deliberately thin — a couple of repos, one follower, and this site. You don't plan, you build: six versions of a thing in two days, keep the one that feels right. This site is exhibit A; you rebuilt it more times than it has features.`);

    await streamText(ai, `the graph gives you away`, { cls: "lead" });
    await streamText(ai, `Here's the real tell. The repos are private — the graph isn't. A near-solid wall this year: about 2,100 commits, roughly 98% of them behind private repos, and GitHub lights every square anyway. The volume is public even when the code never is.`);
    await streamText(ai, `And the break is clean: 39 commits in all of 2025, then 2026 landed and you never looked up.`);
    await runTool(ai, `fetch(github.com/${CONFIG.github})`);
    await renderGithub(ai);

    await streamText(ai, `the bet — Avogram`, { cls: "lead" });
    await streamText(ai, `Your flagship, everywhere in layers: an AI film studio for desktop, "ultra-realistic AI people that promote your thing," a quiet-launch waitlist, an intro film, a Video for YC. Not a product — a whole universe around generative AI for marketing and media.`);

    await streamText(ai, `the iceberg`, { cls: "lead" });
    await streamText(ai, `13 repos on GitHub, all but a couple private. The ~/ folder is the real story: forty-odd projects deep.`);
    await streamText(ai, `A paid AI-risk report, a brand tool, an audio cutter, a handful of web experiments — and a graveyard of one-swing folders behind them. Names stay sealed; that's the point.`);

    await streamText(ai, `the honest read`, { cls: "lead" });
    await streamText(ai, `Strengths: fast, taste-driven, and you actually finish the go-to-market layer most builders skip — waitlists, launch films, a YC video. Real range too: Next.js, Swift, Flutter, mobile and desktop, two languages.`);
    await streamText(ai, `The roast: serial-starter syndrome. You'd rather begin the next thing than grind the last one to a release — and you try every new AI tool instead of committing to one. Focus is your scarcest resource, not ideas.`);
    await streamText(ai, `What's next is obvious: pick one — it's Avogram — and make everything else a feature or a graveyard. You have the product, the waitlist, the YC video; the missing piece is a public v1 people can actually touch.`);

    await streamText(ai, `That's the file. The rest stays sealed — ask how people reach you, that's the one door that's open.`, { cls: "dim" });
  }
  async function answerGithub(ai) {
    await streamText(ai, `Proof you actually ship — your last year on GitHub:`);
    await runTool(ai, `fetch(github.com/${CONFIG.github})`);
    await renderGithub(ai);
  }
  function buildHeatmap(days) {
    const frag = document.createElement("div");
    const cells = [];
    if (days.length) { const pad = new Date(days[0].date + "T00:00:00").getDay(); for (let i = 0; i < pad; i++) cells.push(null); }
    for (const d of days) cells.push(d);
    const weeks = []; for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i + 7));
    const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const mrow = document.createElement("div"); mrow.className = "gh__months"; let last = -1;
    for (const wk of weeks) {
      const first = wk.find(x => x); const slot = document.createElement("span"); slot.className = "m";
      if (first) { const m = new Date(first.date + "T00:00:00").getMonth(); if (m !== last) { slot.textContent = MONTHS[m]; last = m; } }
      mrow.appendChild(slot);
    }
    frag.appendChild(mrow);
    const grid = document.createElement("div"); grid.className = "gh__grid";
    for (const c of cells) {
      const el = document.createElement("span"); el.className = "gh__cell";
      if (!c) el.classList.add("gh__cell--pad");
      else { el.dataset.level = c.level; el.title = c.count + " on " + c.date; }
      grid.appendChild(el);
    }
    frag.appendChild(grid);
    const legend = document.createElement("div"); legend.className = "gh__legend";
    legend.innerHTML = 'less <span class="sq" data-level="0"></span><span class="sq" data-level="1"></span><span class="sq" data-level="2"></span><span class="sq" data-level="3"></span><span class="sq" data-level="4"></span> more';
    frag.appendChild(legend);
    return frag;
  }
  async function renderGithub(container) {
    const box = document.createElement("div"); box.className = "canvas gh";
    box.innerHTML = '<div class="canvas__bar"><span class="canvas__file">github.contributions</span><span class="canvas__tag" id="ghtotal">loading…</span></div><div class="gh__body" id="ghbody"></div>';
    container.appendChild(box); scroll();
    try {
      // NOTE: the ?y=last (rolling year) endpoint is cache-stale for a while; the full-year
      // endpoint stays fresh, so we fetch all years and slice the trailing 365 days ourselves.
      const res = await fetch('https://github-contributions-api.jogruber.de/v4/' + CONFIG.github);
      if (!res.ok) throw 0;
      const data = await res.json();
      const all = (data.contributions || []).slice().sort((a, b) => a.date < b.date ? -1 : 1);
      const iso = d => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const start = new Date(today); start.setDate(start.getDate() - 364);
      const startISO = iso(start), todayISO = iso(today);
      const days = all.filter(x => x.date >= startISO && x.date <= todayISO);
      const total = days.reduce((s, d) => s + (d.count || 0), 0);
      box.querySelector("#ghtotal").textContent = total.toLocaleString("en-US") + " in the last year";
      const gbody = box.querySelector("#ghbody");
      gbody.appendChild(buildHeatmap(days));
      // the interesting part (recent commits) is on the far right — start there
      gbody.scrollLeft = gbody.scrollWidth;
      requestAnimationFrame(() => { gbody.scrollLeft = gbody.scrollWidth; });
    } catch (e) {
      box.querySelector("#ghtotal").textContent = "unavailable";
      box.querySelector("#ghbody").innerHTML = '<div class="gh__note">⚠ couldn\'t reach GitHub right now.</div>';
    }
    scroll();
  }
  async function answerMotto(ai) {
    await streamText(ai, `"You don't need more information. You need more execution."`);
    await streamText(ai, `— Alex Hormozi. Basically your whole operating system.`, { cls: "dim" });
  }
  async function answerHelp(ai) {
    await streamText(ai, `Ask me: what intel you've got on me · what am I good at? · roast me · show my work · github · what to build next · contact.`, { cls: "dim" });
  }
  async function answerFallback(ai, q) {
    await streamText(ai, `I only really know you and your work — try "what intel you've got on me", "show my work", or "roast me".`, { cls: "dim" });
  }

  // ---------- routing ----------
  function route(text) {
    const q = text.toLowerCase();
    if (/(roast|brutal|weak|flaw|worst|bad at|critic|tear me|harsh)/.test(q)) return answerRoast;
    if (/(good at|strength|best at|great at|skill|talent|special)/.test(q)) return answerStrengths;
    if (/(should i|build next|next\b|do next|advice|improve|get better)/.test(q)) return answerNext;
    if (/(github|contribution|commit|stats|activity|streak|graph|heatmap)/.test(q)) return answerGithub;
    if (/(work|receipt|portfolio|show me|shipped|live|projects\b|repos?|see it)/.test(q)) return answerWork;
    if (/(contact|email|reach|hire|twitter|dm)/.test(q)) return answerContact;
    if (/(motto|philosoph|quote|belief|principle|live by)/.test(q)) return answerMotto;
    if (/(intel|dossier|file on|project|working on|what have we|what we|who am i|about me|read me|sum me|assessment|opinion|impression|honest|what do you|who are you|yourself|kilian|bio|who\b|about\b|me\b)/.test(q)) return answerProjects;
    if (/(help|command|what can)/.test(q)) return answerHelp;
    return null;
  }

  const SUGGESTIONS = ["what am I good at?", "roast me", "show my work", "github", "contact"];
  function renderSuggestions() {
    $suggest.innerHTML = "";
    for (const s of SUGGESTIONS) { const b = document.createElement("button"); b.className = "chip"; b.type = "button"; b.textContent = s; b.onclick = () => { if (booting) return; ask(s); }; $suggest.appendChild(b); }
  }

  async function ask(text) {
    if (busy) return;
    text = text.trim(); if (!text) return;
    setBusy(true); $input.value = "";
    commitUserMsg(text);            // the typed prompt moves up into the transcript
    const ai = aiBlock(); await thinking(ai);
    const fn = route(text);
    if (fn) await fn(ai); else await answerFallback(ai, text);
    setBusy(false);
  }
  $form.addEventListener("submit", e => { e.preventDefault(); if (booting) return; ask($input.value); });

  // ---------- boot: the demo types the opener into the input below, then sends ----------
  (async function boot() {
    renderSuggestions();
    await sleep(500);
    await typeIntoInput("hey claude, tell me what intel you've got on me");
    await ask($input.value);
    booting = false;
    $input.focus();
  })();
  </script>
</body>
</html>
